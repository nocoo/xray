name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.4
    with:
      test-command: "bun run test:coverage"
      typecheck-command: "echo 'no typecheck configured'"
      enable-security: "true"
      enable-l2: "false"
    secrets: inherit

  # L2: API E2E — vinext requires Node 22+ (node:fs/promises glob)
  l2-api-e2e:
    name: "L2 API E2E"
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # --ignore-scripts blocks all install scripts including for trustedDependencies.
      # Re-run the install script only for the native bindings we explicitly trust.
      - name: Build trusted native bindings
        run: cd node_modules/better-sqlite3 && bun run install

      - name: "L2: API E2E tests"
        run: bun run test:e2e:api
        env:
          CI: "true"
          E2E_SKIP_AUTH: "true"

  # L3: Browser E2E — Playwright against local vinext dev + SQLite
  l3-playwright:
    name: "L3 Playwright E2E"
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build trusted native bindings
        run: cd node_modules/better-sqlite3 && bun run install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: "L3: Playwright E2E tests"
        run: bun run test:e2e:browser
        env:
          CI: "true"
